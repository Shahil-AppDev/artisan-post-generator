version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: artisan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: artisan_posts
      POSTGRES_USER: artisan_user
      POSTGRES_PASSWORD: artisan_secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - artisan_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artisan_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://artisan_user:artisan_secure_password_2024@postgres:5432/artisan_posts
      JWT_SECRET: your_jwt_secret_change_in_production_min_32_chars
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - artisan_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: artisan_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - artisan_network

volumes:
  postgres_data:

networks:
  artisan_network:
    driver: bridge
